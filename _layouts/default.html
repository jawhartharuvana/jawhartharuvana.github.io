<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam&display=swap" rel="stylesheet">

  <style>
  body {
    font-family: "Noto Sans Malayalam", sans-serif;
    background: #eef2f3;
    margin: 0;
    padding: 0;
    line-height: 1.8;
  }

  .wrapper {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
  }

  .section {
    background: #ffffff;
    padding: 25px 20px;
    margin-bottom: 25px;
    border-radius: 14px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
  }

  h1 {
    font-size: 32px;
    text-align: center;
    margin-bottom: 10px;
  }

  h2 {
    color: #1e7f5c;
    margin-bottom: 10px;
  }

  p {
    font-size: 18px;
    color: #333;
  }

  .hero {
    text-align: center;
    margin-bottom: 30px;
  }

  .profile {
    width: 160px;
    border-radius: 16px;
    border: 5px solid white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  }

  .tagline {
    color: #666;
    margin-top: 10px;
    font-size: 17px;
  }

  ul {
    padding-left: 20px;
  }

  li {
    margin-bottom: 8px;
  }
  </style>
</head>

<body>
  <div class="wrapper">
    {{ content }}
  </div>
</body>
  </html>
