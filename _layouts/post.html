<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Noto Sans Malayalam", sans-serif;
      background: #f5f7f6;
      margin: 0;
      padding: 0;
      line-height: 1.7;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 30px 25px;
      border-radius: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    h1 {
      font-size: 35px;
      margin-bottom: 10px;
      color: #222;
    }

    .date {
      color: #777;
      font-size: 14px;
      margin-bottom: 25px;
    }

    p {
      margin-bottom: 18px;
      font-size: 37px;
      color: #333;
    }

    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 30px 0;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>{{ page.title }}</h1>
    <div class="date">{{ page.date | date: "%B %d, %Y" }}</div>

    {{ content }}
  </div>

</body>
  </html>
