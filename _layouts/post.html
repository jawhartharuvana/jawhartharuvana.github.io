<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Malayalam&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Noto Sans Malayalam", sans-serif;
      background: #f5f7f6;
      margin: 0;
      padding: 0;
      line-height: 1.7;
    }

    .container {
  max-width: 720px;
  margin: 50px auto;
  background: #ffffff;
  padding: 35px 28px;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h1 {
  font-size: 32px;
  margin-bottom: 12px;
  color: #111;
    }

    .date {
  color: #888;
  font-size: 15px;
  margin-bottom: 30px;
    }

    p {
  margin-bottom: 20px;
  font-size: 19px;   /* was ~16–17 */
  color: #222;
  line-height: 1.9;
    }

    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 30px 0;
    }
  </style>
</head>

<body>
body {
  background: #eef2f3;
}
  <div class="container">
    <h1>{{ page.title }}</h1>
    <div class="date">{{ page.date | date: "%B %d, %Y" }}</div>

    {{ content }}
  </div>

</body>
  </html>
